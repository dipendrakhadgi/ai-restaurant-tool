<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Restaurant Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <h1>🍔 AI Restaurant Assistant</h1>
  <p class="subtitle">Internal AI tool for restaurant teams</p>

<div class="modes">
  <button class="mode-btn active" onclick="setMode('menu', this)">Menu</button>
  <button class="mode-btn" onclick="setMode('customer', this)">Customer</button>
  <button class="mode-btn" onclick="setMode('upsell', this)">Upsell</button>
</div>
  <textarea id="input" placeholder="Type something like: 'Create a burger description'"></textarea>

  <button class="generate" onclick="send()">Generate</button>
  <div id="loading" class="loading">Thinking...</div>

  <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
